<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avançando no CSS3</title>

    <!-- CSS Internal é escrito dentro da tag head -->
    <style>
        /* A árvore DOM define a hierarquia dos elementos HTML */
        header p{
            color: chocolate;
            text-align: center;
        }
    </style>

    <!-- CSS external é importante dentro do head (arquivo separado) -->
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <!-- CSS Inline é escrito dentro da tag -->
        <h1 style="text-align: center; color: brown;">CSS Inline, Internal e External</h1>
        <p>Esses são os 3 tipos de CSS</p>
    </header>

    <p id="texto">Este é outro paragrafo. Filho de body. Irmão de header.</p>
    <p class="destaque">Este paragrafo possui uma classe chamada "destaque"</p>

    <div class="box">
        Passe o mouse aqui
    </div>
</body>
</html>
